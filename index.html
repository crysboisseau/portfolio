<meta charset="UTF-8">
<div id="particles-js"></div>

<!-- includes dynamiques -->
<div id="config"></div>
<div id="header"></div>

<main class="container-fluid p-0">

  <section id="accueil" class="page-section min-vh-100 d-flex align-items-center justify-content-center text-center">
    <div class="text-white">
      <h1 id="nom" class="display-1 fw-bold"></h1>
      <p class="lead display-6 fst-italic bg-danger p-2 bg-opacity-10">
        Étudiant BTS SIO SISR à Paul Louis Courier
      </p>
      <a href="#projets" class="btn btn-danger btn-lg">Mes projets</a>
    </div>
  </section>

  <section id="formation" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="parcours" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="parcours-stages-plastivaloire" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="parcours-stages-econocom" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="parcours-certifications" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="parcours-competences" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="projets" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="projets-ap-millenuits" class="page-section d-none min-vh-100 d-flex align-items-center"></section>
  <section id="contact" class="page-section d-none min-vh-100 d-flex align-items-center"></section>

</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

/* =========================
   CHARGEMENT HTML (INCLUDES)
========================== */

function loadHTML(id, file) {
    return fetch(file)
        .then(res => res.text())
        .then(data => {
            document.getElementById(id).innerHTML = data;
        });
}

Promise.all([
    loadHTML("header", "vues/header.html"),
    loadHTML("formation", "vues/formation.html"),
    loadHTML("parcours", "vues/parcours.html"),
    loadHTML("parcours-stages-plastivaloire", "vues/parcours-stages/parcours-stages-plastivaloire.html"),
    loadHTML("parcours-stages-econocom", "vues/parcours-stages/parcours-stages-econocom.html"),
    loadHTML("parcours-certifications", "vues/parcours-certifications.html"),
	loadHTML("parcours-competences", "vues/parcours-competences.html"),
    loadHTML("projets", "vues/projets.html"),
    loadHTML("projets-ap-millenuits", "vues/projets-ap/projets-ap-millenuits.html"),
    loadHTML("contact", "vues/contact.html"),
    loadHTML("footer", "vues/footer.html")
]);

/* =========================
   NOM
========================== */

const nom = "Boisseau Crys";
const nomEl = document.getElementById("nom");
if (nomEl) nomEl.textContent = nom;

/* =========================
   PARTICLES JS
========================== */

if (typeof particlesJS !== "undefined") {
    particlesJS("particles-js", {
        particles: {
            number: { value: 30, density: { enable: true, value_area: 800 } },
            color: { value: "#dc3545" },
            shape: { type: "circle" },
            opacity: { value: 0.5 },
            size: { value: 3, random: true },
            line_linked: {
                enable: true,
                distance: 150,
                color: "#dc3545",
                opacity: 0.4,
                width: 1
            },
            move: { enable: true, speed: 2 }
        },
        interactivity: {
            detect_on: "window",
            events: {
                onhover: { enable: true, mode: "grab" },
                onclick: { enable: true, mode: "push" },
                resize: true
            },
            modes: {
                grab: { distance: 200 },
                push: { particles_nb: 4 }
            }
        },
        retina_detect: true
    });
}

/* =========================
   NAVIGATION SPA STYLE
========================== */

const sections = document.querySelectorAll('.page-section');

function showSection(id) {

    if (!id) id = 'accueil';

    const target = document.getElementById(id);
    if (!target) return;

    // cacher toutes les sections
    sections.forEach(sec => {
        sec.classList.add('d-none');
        sec.classList.remove('section-animate');
    });

    // afficher section active
    target.classList.remove('d-none');
    void target.offsetWidth;
    target.classList.add('section-animate');

    window.scrollTo({ top: 0, behavior: "smooth" });

    // reset active links
    document.querySelectorAll('.active-link')
        .forEach(el => el.classList.remove('active-link'));

    // activer tous les liens correspondant
    document.querySelectorAll(`[href="#${id}"]`)
        .forEach(el => el.classList.add('active-link'));

    history.pushState(null, null, `#${id}`);
}

/* =========================
   EVENT DELEGATION (IMPORTANT)
========================== */

document.addEventListener('click', (e) => {
    const link = e.target.closest('a[href^="#"]');
    if (!link) return;

    const id = link.getAttribute('href').replace('#', '');
    const target = document.getElementById(id);

    if (!target) return;

    e.preventDefault();
    showSection(id);
});

/* =========================
   BACK / FORWARD NAV
========================== */

window.addEventListener('popstate', () => {
    const id = window.location.hash.replace('#', '');
    showSection(id);
});

/* =========================
   INIT PAGE
========================== */

const initialId = window.location.hash.replace('#', '');
showSection(initialId);

});
</script>
